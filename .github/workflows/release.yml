name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build x86-64
        run: |
          version="${GITHUB_REF_NAME#v}"
          cmake -S . -B build-x64 -DCMAKE_BUILD_TYPE=Release -DVOIDYT_BUILD_VERSION="$version" -DCMAKE_EXE_LINKER_FLAGS=-static
          cmake --build build-x64
          ctest --test-dir build-x64 --output-on-failure
      - name: Build ARM64
        run: |
          version="${GITHUB_REF_NAME#v}"
          cmake -S . -B build-arm64 -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DVOIDYT_BUILD_VERSION="$version" -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_EXE_LINKER_FLAGS=-static
          cmake --build build-arm64
      - name: Package
        run: |
          chmod +x scripts/package.sh
          version="${GITHUB_REF_NAME#v}"
          scripts/package.sh linux x86_64 build-x64/void-yt dist "$version"
          scripts/package.sh linux aarch64 build-arm64/void-yt dist "$version"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*
          if-no-files-found: error

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build universal binary
        run: |
          version="${GITHUB_REF_NAME#v}"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVOIDYT_BUILD_VERSION="$version" -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build
      - name: Package
        run: |
          chmod +x scripts/package.sh
          version="${GITHUB_REF_NAME#v}"
          scripts/package.sh macos universal build/void-yt dist "$version"
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/*
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          cmake -S . -B build -DVOIDYT_BUILD_VERSION="$version" -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: Build and test
        run: |
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure
      - name: Package
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          ./scripts/package.ps1 -Binary build/Release/void-yt.exe -OutputDirectory dist -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Prepare installers and checksums
        run: |
          sed "s|@GITHUB_REPOSITORY@|$GITHUB_REPOSITORY|g" scripts/install.sh > dist/install.sh
          sed "s|@GITHUB_REPOSITORY@|$GITHUB_REPOSITORY|g" scripts/install.ps1 > dist/install.ps1
          cd dist
          sha256sum void-yt-* > checksums.sha256
      - name: Attest release archives
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/void-yt-*.tar.gz
            dist/void-yt-*.zip
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes

